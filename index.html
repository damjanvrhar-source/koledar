<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Damjanov Premium Koledar</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
body{
    background:url('hf_20260531_150404_bca28c50-cc4f-4d19-b686-547d534a9c47.png') no-repeat;
    background-position:left center;
    background-size:auto 110%;
    background-color:#0f1320;
}
}

.panel{
    position:absolute;
    right:40px;
    top:40px;

    padding:25px;

    border-radius:20px;

    background:rgba(0,0,0,0.25);

    backdrop-filter:blur(10px);

    color:white;

    text-align:right;

    min-width:320px;

    box-shadow:0 0 25px rgba(0,0,0,0.4);
}

#time{
    font-size:72px;
    font-weight:700;
    color:#ffffff;
}

#date{
    font-size:28px;
    margin-top:10px;
    color:#d9c4ff;
}

.line{
    height:2px;
    background:linear-gradient(to left,#ffd84d,#7b4dff);
    margin:18px 0;
}

#weather{
    font-size:26px;
}

.title{
    color:#ffd84d;
    font-weight:bold;
    margin-bottom:8px;
    letter-spacing:1px;
}
</style>
</head>

<body>

<div class="panel">

<div id="time"></div>

<div id="date"></div>

<div class="line"></div>

<div class="title">MARIBOR</div>

<div id="weather">Nalagam vreme...</div>

</div>

<script>

function updateClock(){

const now=new Date();

document.getElementById("time").innerHTML=
now.toLocaleTimeString("sl-SI");

document.getElementById("date").innerHTML=
now.toLocaleDateString("sl-SI",{
weekday:"long",
day:"numeric",
month:"long",
year:"numeric"
});

}

updateClock();
setInterval(updateClock,1000);

async function loadWeather(){

try{

const response=await fetch(
"https://api.open-meteo.com/v1/forecast?latitude=46.5547&longitude=15.6459&current=temperature_2m"
);

const data=await response.json();

document.getElementById("weather").innerHTML=
"🌤️ "+data.current.temperature_2m+" °C";

}catch{

document.getElementById("weather").innerHTML=
"Podatki niso na voljo";

}

}

loadWeather();
setInterval(loadWeather,1800000);

</script>

</body>
</html>
