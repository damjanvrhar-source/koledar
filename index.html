<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Damjanov koledar</title>

<style>
html, body {
    margin: 0;
    height: 100%;
}

body {
    background: url('hf_20260531_150404_bca28c50-cc4f-4d19-b686-547d534a9c47.png') center center/cover no-repeat;
    font-family: Arial, sans-serif;
}

.panel {
    position: absolute;
    top: 50px;
    right: 50px;
    text-align: right;
    color: white;
    text-shadow: 2px 2px 8px black;
}

#time {
    font-size: 70px;
    font-weight: bold;
}

#date {
    font-size: 28px;
    margin-top: 10px;
}

#weather {
    font-size: 24px;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="panel">
    <div id="time"></div>
    <div id="date"></div>
    <div id="weather">Nalagam vreme ...</div>
</div>

<script>
function updateClock() {
    const now = new Date();

    document.getElementById("time").innerHTML =
        now.toLocaleTimeString("sl-SI");

    document.getElementById("date").innerHTML =
        now.toLocaleDateString("sl-SI", {
            weekday: "long",
            day: "numeric",
            month: "long",
            year: "numeric"
        });
}

updateClock();
setInterval(updateClock, 1000);

async function loadWeather() {
    try {
        const response = await fetch(
            "https://api.open-meteo.com/v1/forecast?latitude=46.5547&longitude=15.6459&current=temperature_2m"
        );

        const data = await response.json();

        document.getElementById("weather").innerHTML =
            "🌤️ Maribor<br>" +
            data.current.temperature_2m + "°C";
    }
    catch {
        document.getElementById("weather").innerHTML =
            "Vreme ni na voljo";
    }
}

loadWeather();
</script>

</body>
</html>
